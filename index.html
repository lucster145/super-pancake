<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Origami Recipes Vault</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Alegreya+Sans:wght@400;500;700;800&family=Sora:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="paper-overlay" aria-hidden="true"></div>

    <main class="app-shell">
        <header class="hero">
            <p class="kicker">Fold • Learn • Build</p>
            <h1>Origami Recipes Vault</h1>
            <p class="hero-copy">
                A big collection of origami recipes with clear steps, levels, and tags.
                Pick a model and follow the fold sequence.
            </p>
        </header>

        <section class="control-bar" aria-label="Search and filters">
            <label class="field-wrap" for="searchInput">
                <span>Search Recipe</span>
                <input id="searchInput" type="search" placeholder="Try crane, flower, dragon..." autocomplete="off">
            </label>

            <label class="field-wrap" for="difficultyFilter">
                <span>Difficulty</span>
                <select id="difficultyFilter">
                    <option value="all">All</option>
                    <option value="Beginner">Beginner</option>
                    <option value="Intermediate">Intermediate</option>
                    <option value="Advanced">Advanced</option>
                </select>
            </label>

            <label class="field-wrap" for="typeFilter">
                <span>Type</span>
                <select id="typeFilter">
                    <option value="all">All</option>
                    <option value="Animal">Animal</option>
                    <option value="Flower">Flower</option>
                    <option value="Decor">Decor</option>
                    <option value="Toy">Toy</option>
                    <option value="Useful">Useful</option>
                    <option value="Seasonal">Seasonal</option>
                </select>
            </label>
        </section>

        <section class="stats" aria-live="polite">
            <div class="stat-card">
                <p>Total Recipes</p>
                <strong id="totalCount">0</strong>
            </div>
            <div class="stat-card">
                <p>Showing</p>
                <strong id="shownCount">0</strong>
            </div>
            <div class="stat-card">
                <p>Selection</p>
                <strong id="selectedName">None</strong>
            </div>
        </section>

        <section class="content-grid">
            <aside class="recipe-list-panel" aria-label="Origami recipe list">
                <h2>Recipe Catalog</h2>
                <p class="panel-caption">Tap a recipe to view full instructions.</p>
                <div id="recipeList" class="recipe-list"></div>
            </aside>

            <article class="recipe-detail-panel" aria-label="Selected recipe details">
                <div id="recipeDetail" class="recipe-detail"></div>
            </article>
        </section>
    </main>

    <script src="main.js"></script>
</body>
</html>
