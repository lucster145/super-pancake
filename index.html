<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple PC</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect fill='%230078d4' width='100' height='100' rx='10'/%3E%3Ctext x='50' y='65' font-size='60' fill='white' text-anchor='middle'%3E🪟%3C/text%3E%3C/svg%3E">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="desktop">
        <!-- Wallpaper -->
        <div class="wallpaper" role="img" aria-label="Simple PC desktop wallpaper"></div>

        <!-- Desktop Icons -->
        <div class="desktop-icons" role="toolbar" aria-label="Desktop shortcuts">
            <div class="desktop-icon" draggable="true" data-app="playstore" tabindex="0" role="button" aria-label="Open Play Store">
                <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect fill='%234CAF50' width='100' height='100'/%3E%3Ctext x='50' y='60' font-size='50' fill='white' text-anchor='middle' font-weight='bold'%3E%26play%3C/text%3E%3C/svg%3E" alt="Play Store icon">
                <p>Play Store</p>
            </div>
            <div class="desktop-icon" draggable="true" data-app="books" tabindex="0" role="button" aria-label="Open Books Library">
                <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect fill='%23FF6B6B' width='100' height='100'/%3E%3Ctext x='50' y='65' font-size='50' fill='white' text-anchor='middle'%3E📚%3C/text%3E%3C/svg%3E" alt="Books Library icon">
                <p>Books Library</p>
            </div>
            <div class="desktop-icon" draggable="true" data-app="football" tabindex="0" role="button" aria-label="Open Throaball Game">
                <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect fill='%23228B22' width='100' height='100'/%3E%3Ctext x='50' y='65' font-size='50' fill='white' text-anchor='middle'%3E⚽%3C/text%3E%3C/svg%3E" alt="Throaball Game icon">
                <p>Throaball</p>
            </div>
            <div class="desktop-icon" draggable="true" data-app="calendar" tabindex="0" role="button" aria-label="Open Calendar">
                <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect fill='%232196F3' width='100' height='100'/%3E%3Ctext x='50' y='65' font-size='50' fill='white' text-anchor='middle'%3E📅%3C/text%3E%3C/svg%3E" alt="Calendar icon">
                <p>Calendar</p>
            </div>
            <div class="desktop-icon" draggable="true" data-app="net2" tabindex="0" role="button" aria-label="Open Net2 Entertainment">
                <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect fill='%23E50914' width='100' height='100'/%3E%3Ctext x='50' y='65' font-size='50' fill='white' text-anchor='middle'%3E🎬%3C/text%3E%3C/svg%3E" alt="Net2 icon">
                <p>Net2</p>
            </div>
            <div class="desktop-icon" draggable="true" data-app="browser" tabindex="0" role="button" aria-label="Open Web Browser">
                <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect fill='%234285F4' width='100' height='100'/%3E%3Ctext x='50' y='65' font-size='50' fill='white' text-anchor='middle'%3E🌐%3C/text%3E%3C/svg%3E" alt="Web Browser icon">
                <p>Web Browser</p>
            </div>
            <div class="desktop-icon" draggable="true" data-app="simpleai" tabindex="0" role="button" aria-label="Open Simple AI">
                <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect fill='%236c3483' width='100' height='100'/%3E%3Ctext x='50' y='65' font-size='50' fill='white' text-anchor='middle'%3E🤖%3C/text%3E%3C/svg%3E" alt="Simple AI icon">
                <p>Simple AI</p>
            </div>
            <div class="desktop-icon" draggable="true" data-app="vibe" tabindex="0" role="button" aria-label="Open Vibe">
                <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cdefs%3E%3ClinearGradient id='v' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' stop-color='%236c47ff'/%3E%3Cstop offset='100%25' stop-color='%23e84393'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect fill='url(%23v)' width='100' height='100' rx='22'/%3E%3Ctext x='50' y='65' font-size='50' fill='white' text-anchor='middle'%3E%F0%9F%93%B1%3C/text%3E%3C/svg%3E" alt="Vibe icon">
                <p>Vibe</p>
            </div>
        </div>

        <!-- Windows Container -->
        <div id="windows-container"></div>

        <!-- Taskbar -->
        <div class="taskbar">
            <div class="taskbar-start">
                <button id="start-btn" class="start-btn">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="white">
                        <rect x="2" y="2" width="8" height="8"/>
                        <rect x="14" y="2" width="8" height="8"/>
                        <rect x="2" y="14" width="8" height="8"/>
                        <rect x="14" y="14" width="8" height="8"/>
                    </svg>
                </button>
            </div>
            <div class="taskbar-apps" id="taskbar-apps"></div>
            <div class="taskbar-end">
                <div class="system-tray">
                    <span id="clock">12:00</span>
                </div>
            </div>
        </div>

        <!-- Start Menu -->
        <div id="start-menu" class="start-menu hidden">
            <div class="start-menu-header">
                <h2>All Apps</h2>
                <button class="close-btn" onclick="toggleStartMenu()">×</button>
            </div>
            <div id="all-apps-list" class="all-apps-list"></div>
        </div>

        <!-- Right-click Context Menu -->
        <div id="context-menu" class="context-menu hidden">
            <div class="context-item" onclick="createNewWindow('notes')">New Note</div>
            <div class="context-item" onclick="refreshDesktop()">Refresh</div>
        </div>
    </div>

    <!-- Window Template (hidden) -->
    <template id="window-template">
        <div class="window" style="width: 600px; height: 400px; left: 100px; top: 100px;">
            <div class="window-header">
                <div class="window-title"></div>
                <div class="window-controls">
                    <button class="minimize-btn">_</button>
                    <button class="maximize-btn">□</button>
                    <button class="close-btn">×</button>
                </div>
            </div>
            <div class="window-content"></div>
        </div>
    </template>

    <script src="main.js"></script>
</body>
</html>
